<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <style>
    body { margin:0; font-family:'Segoe UI',sans-serif; background:#f5f5f5; display:flex; justify-content:center; align-items:center; height:100vh; }
    .chat-container { width:400px; max-width:90%; background:#fff; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.2); display:flex; flex-direction:column; overflow:hidden; }
    .messages { flex:1; padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
    .message { padding:10px 14px; border-radius:8px; max-width:80%; word-wrap:break-word; }
    .user { align-self:flex-end; background:#007bff; color:#fff; }
    .bot { align-self:flex-start; background:#e0e0e0; color:#000; }
    .input-container { display:flex; border-top:1px solid #ddd; }
    input { flex:1; padding:12px; border:none; outline:none; font-size:16px; }
    button { padding:0 16px; border:none; background:#007bff; color:#fff; cursor:pointer; font-size:16px; }
    button:hover { background:#0056b3; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="messages" id="messages"></div>
    <div class="input-container">
      <input type="text" id="userInput" placeholder="Type your message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesContainer = document.getElementById('messages');
    const input = document.getElementById('userInput');

    async function sendMessage() {
      const userMessage = input.value.trim();
      if (!userMessage) return;
      appendMessage(userMessage, 'user');
      input.value = '';

      try {
        const response = await fetch("http://localhost:3000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: userMessage })
        });
        const data = await response.json();
        appendMessage(data.reply, 'bot');
      } catch (err) {
        appendMessage("Error: " + err.message, 'bot');
      }
    }

    function appendMessage(text, sender) {
      const div = document.createElement('div');
      div.className = 'message ' + sender;
      div.textContent = text;
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    input.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
  </script>
</body>
</html>
